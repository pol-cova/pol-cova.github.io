<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa uwu</title>
    <style>
        .image-container {
            width: 100%;
            text-align: center;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="./src/uwu.png" alt="Responsive Image">
    </div>
    <audio autoplay loop>
        <source src="./src/valentine.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // JavaScript to handle manual playback
        const audio = document.getElementById('valentineAudio');
        const playButton = document.createElement('button');
        playButton.textContent = 'Sonidito';
        playButton.addEventListener('click', function() {
          audio.play();
        });
        document.body.appendChild(playButton);
      </script>
</body>
</html>
